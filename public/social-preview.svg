  <rect x="56" y="56" width="1168" height="528" rx="30" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.12)"/>

  <g filter="url(#shadow)">
    <rect x="646" y="108" width="502" height="404" rx="28" fill="rgba(15,23,42,0.72)" stroke="rgba(255,255,255,0.12)"/>
    <rect x="680" y="154" width="170" height="20" rx="10" fill="rgba(255,255,255,0.16)"/>
    <rect x="1000" y="154" width="114" height="20" rx="10" fill="#F97316" opacity="0.85"/>
    <rect x="680" y="200" width="434" height="56" rx="18" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.08)"/>

