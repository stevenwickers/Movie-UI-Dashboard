    <rect x="826" y="286" width="126" height="92" rx="20" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.08)"/>
    <rect x="972" y="286" width="142" height="92" rx="20" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.08)"/>

    <rect x="680" y="410" width="434" height="18" rx="9" fill="rgba(255,255,255,0.08)"/>
    <rect x="680" y="446" width="434" height="18" rx="9" fill="rgba(255,255,255,0.08)"/>
  </g>

