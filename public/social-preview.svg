<?xml version="1.0" encoding="UTF-8"?>
<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Movie UI Dashboard</title>
  <desc id="desc">Compare APIs, slice movie data, and manage records in one responsive admin UI.</desc>
  <defs>
    <linearGradient id="bg" x1="84" y1="52" x2="1180" y2="592" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F172A"/>
      <stop offset="0.52" stop-color="#111827"/>
      <stop offset="1" stop-color="#1F2937"/>
    </linearGradient>
    <linearGradient id="panel" x1="250" y1="120" x2="1110" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="rgba(255,255,255,0.18)"/>
      <stop offset="1" stop-color="rgba(255,255,255,0.06)"/>
    </linearGradient>
    <linearGradient id="accent" x1="188" y1="112" x2="582" y2="410" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F97316"/>
      <stop offset="1" stop-color="#FACC15"/>
    </linearGradient>
    <filter id="blur-lg" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#020617" flood-opacity="0.3"/>
    </filter>
  </defs>

  <rect width="1280" height="640" rx="36" fill="url(#bg)"/>

  <circle cx="1120" cy="92" r="160" fill="#F97316" opacity="0.18" filter="url(#blur-lg)"/>
