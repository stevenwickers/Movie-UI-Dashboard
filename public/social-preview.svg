    <text x="866" y="352" fill="#F8FAFC" font-size="30" font-weight="700" font-family="'Geist Variable', Arial, sans-serif">18</text>
    <text x="1012" y="352" fill="#F8FAFC" font-size="30" font-weight="700" font-family="'Geist Variable', Arial, sans-serif">API</text>

    <text x="720" y="370" fill="#94A3B8" font-size="14" font-family="'Geist Variable', Arial, sans-serif">Worldwide gross</text>
    <text x="866" y="370" fill="#94A3B8" font-size="14" font-family="'Geist Variable', Arial, sans-serif">Columns</text>
    <text x="1012" y="370" fill="#94A3B8" font-size="14" font-family="'Geist Variable', Arial, sans-serif">Mode toggle</text>
